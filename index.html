<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Whole Food Market | Sign Up</title>
    <link rel="icon"  href="logo.png">
    <link rel="stylesheet" href="index.css">
  </head>
  <body>
    <div class="all">
      <div class="main">
        <div class="left">
          <img src="leftSidepic.jpg" alt="leftSidePic" width="400px" height="400px" />
        </div>
        <div class="right">
          <div><img src="logo.png" alt="Logo"  width="100px" height="100px"/></div>
          <div class="inp">
           <form class="inp" id="signupForm">
             <input class="input"
              type="text"
              placeholder="Username"
              id="username"
              name="username" required
            />
            <input class="input"
              type="email"
              placeholder="example@gmail.com"
              id="email"
              name="email" required
            />
            <input class="input"
              type="password"
              placeholder="@#$%^&*()_+(PassWord)"
              id="password"
              name="password" required
            />
            <button class="btn" type="submit" id="createAccount">Create Account</button>
          </form>
          </div>
          <div class="log"><a href="login.html">Already have an account? Log in</a></div>
        </div>
      </div>
    </div>
  </body>

<script src="signUp.js"></script>
</html>
