<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Whole Food Market | Login</title>
    <link rel="icon"  href="logo.png">
    <link rel="stylesheet" href="index.css">
  </head>
  <body>
    <div class="all">
      <div class="main">
        <div class="left">
          <img src="leftSidepic.jpg" alt="leftSidePic" width="400px" height="400px" />
        </div>
        <div class="right">
          <div><img src="logo.png" alt="Logo"  width="100px" height="100px"/></div>
          <div class="inp">
            <form action="" method="get" class="inp" id="loginForm">
            <input class="input"
              type="email"
              placeholder="example@gmail.com"
              id="email"
              name="email" required
            />
            <input class="input"
              type="password"
              placeholder="@#$%^&*()_+(PassWord)"
              id="password"
              name="password" required
            />
            <button class="btn" type="submit" id="createAccount">Login</button> 
            </form>
          </div>
          <div class="log"><a href="index.html">Create New Account ? Sign Up</a></div>
        </div>
      </div>
    </div>
  </body>
<script src="login.js"></script>
</html>
